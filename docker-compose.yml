version: "3.9"

services:
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/tododb
      - PORT=5000
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=tododb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: